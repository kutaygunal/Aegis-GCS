# AEGIS GCS — Active Task Registry
# Tasks are ordered by dependency. Do not start a task until all depends_on tasks are done.
# Status values: planned | ready | in_progress | review | done | blocked

---

# ═══════════════════════════════════════════════════════════════
# SPRINT 2 — Safety Core
# ═══════════════════════════════════════════════════════════════

tasks:

  - id: P2-001
    phase: P2
    title: MAVLink command ACK handling
    priority: critical
    area: telemetry
    risk: high
    depends_on: [P1-001]
    acceptance:
      - A MavlinkCommander service exists for sending commands and receiving ACK/NAK.
      - Commands are assigned sequence numbers and tracked until ACK, NAK, or timeout.
      - Retry logic is configurable (max retries, timeout per command type).
      - Command result states: pending, ack, nak, timeout, retrying.
      - Results are emitted on TelemetryBus for UI/plugins to observe.
      - Command service can be unit-tested without a real UDP socket.
    implementation_rules:
      - Keep MavlinkCommander separate from MavlinkParser and MavlinkIO.
      - Do not let UI widgets call sendto() directly.
      - Sequence numbers must be monotonic and thread-safe.
      - Add mock/fake transport for testing ACK/NAK/timeout paths.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: ready

  - id: P2-002
    phase: P2
    title: Command confirmation workflow
    priority: critical
    area: safety
    risk: high
    depends_on: [P2-001]
    acceptance:
      - Safety-critical commands (ARM, DISARM, mission upload, RTL, emergency) require confirmation.
      - Confirmation is enforced in the command service, not just the UI.
      - A "confirmed" flag must be present in the VehicleCommand before MavlinkCommander will enqueue it.
      - Unconfirmed safety-critical commands are rejected with a clear reason.
      - Confirmation timeout: if not confirmed within N seconds, the command is dropped.
      - The confirmation API is usable by both UI and headless/test paths.
    implementation_rules:
      - Extend VehicleCommand with a confirmation requirement and confirmation flag.
      - MavlinkCommander gates confirmed vs unconfirmed commands.
      - Do not put confirmation logic in widgets.
      - Add tests for confirmed success, unconfirmed rejection, and timeout.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P2-003
    phase: P2
    title: Failsafe alerting
    priority: high
    area: safety
    risk: high
    depends_on: [P1-001, P2-001]
    acceptance:
      - A FailsafeMonitor watches telemetry and emits alerts for configured conditions.
      - Implemented conditions: heartbeat lost, GPS lost, low battery, EKF unhealthy, RC lost, geofence breach.
      - Each condition has configurable thresholds (e.g., battery threshold %, heartbeat timeout ms).
      - Alerts are published on TelemetryBus with severity and condition ID.
      - Alerts are deduplicated (no spam on sustained violation).
      - Recovery: when a condition clears, a "recovered" event is published.
      - Can be tested with simulated telemetry injection.
    implementation_rules:
      - FailsafeMonitor reads from VehicleState and TelemetryBus only; it does not own sockets.
      - Thresholds are configurable via config JSON under "failsafe" domain.
      - Use hysteresis to avoid flapping (e.g., low battery alert at 20%, recover at 25%).
      - Keep alert logic separate from command logic.
      - Add tests for each condition, threshold boundary, hysteresis, dedup, and recovery.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P2-004
    phase: P2
    title: Tamper-evident audit log
    priority: high
    area: safety
    risk: medium
    depends_on: [P2-001, P2-002]
    acceptance:
      - An AuditLog service records every command request, command result, mode change, and failsafe event.
      - Entries are append-only and include timestamp, actor, action, parameters, and outcome.
      - Each entry includes a hash chain (previous entry hash + current content -> current hash).
      - The log file is tamper-evident: any modification breaks the hash chain.
      - A utility function can verify the full chain and report the first broken link.
      - Audit log path is configurable; rotation policy is defined.
    implementation_rules:
      - Use a simple hash (SHA-256 via Qt or std). Do not add a crypto library dependency unless justified.
      - Keep the audit log separate from the rotating debug log (different purpose, different audience).
      - Do not log sensitive data (encryption keys, passwords).
      - Add tests for append, hash chain integrity, tamper detection, and verification.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P2-005
    phase: P2
    title: Read-only/demo/operator modes
    priority: medium
    area: safety
    risk: medium
    depends_on: [P2-002]
    acceptance:
      - The application supports three control modes: read-only (viewer), demo (simulated telemetry, no commands), operator (full control).
      - Mode is set at startup via config or command-line argument.
      - In read-only mode, all command-enqueue paths are blocked at the command service level.
      - In demo mode, dummy telemetry runs but the command service rejects all outbound commands.
      - Mode is observable on TelemetryBus so UI can show mode indicator and disable/hide command buttons.
      - Mode change requires app restart (no runtime switching to prevent accidental escalation).
    implementation_rules:
      - The mode gate lives in MavlinkCommander or a dedicated CommandPolicy service.
      - UI reads mode from TelemetryBus; it does not decide policy.
      - Do not sprinkle mode checks across every widget; centralize them.
      - Add tests for each mode: command acceptance/rejection, dummy telemetry behavior, and bus emissions.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

