# SPRINT 3 — Real GCS Core
# ═══════════════════════════════════════════════════════════════

  - id: P3-001
    phase: P3
    title: Mission protocol download
    priority: high
    area: mission
    risk: high
    depends_on: [P2-001, P2-002]
    acceptance:
      - MavlinkCommander can initiate a MISSION_REQUEST_LIST sequence.
      - The system receives MISSION_COUNT, then requests each waypoint with MISSION_REQUEST.
      - Received MISSION_ITEM_INT messages are parsed into an internal Mission model.
      - The full mission is validated (coordinate bounds, command type support) before storage.
      - Progress is emitted on TelemetryBus (count received, current item, total).
      - Timeouts and retries are handled per the command ACK framework.
      - Can be tested with a mock MAVLink responder.
    implementation_rules:
      - Keep mission model separate from UI; UI observes MissionState.
      - Reuse MavlinkCommander for sequencing and retry.
      - Do not block the main thread during download.
      - Add tests for full download, partial download, timeout, retry, and invalid item rejection.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P3-002
    phase: P3
    title: Mission protocol upload
    priority: high
    area: mission
    risk: high
    depends_on: [P3-001]
    acceptance:
      - MavlinkCommander can initiate MISSION_COUNT, then send MISSION_ITEM_INT for each waypoint.
      - The system waits for MISSION_REQUEST after each item, and for MISSION_ACK after the last.
      - Upload progress is emitted on TelemetryBus.
      - The upload sequence can be cancelled.
      - Timeouts and retries are handled per the command ACK framework.
      - Can be tested with a mock MAVLink responder.
    implementation_rules:
      - Reuse MavlinkCommander for sequencing and retry.
      - Keep upload state in a dedicated MissionUploader class, not in UI.
      - Support cancellation cleanly: stop sending and emit cancelled state.
      - Add tests for full upload, partial upload, cancellation, timeout, retry, and NAK handling.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P3-003
    phase: P3
    title: Mission clear
    priority: medium
    area: mission
    risk: medium
    depends_on: [P2-001, P2-002]
    acceptance:
      - MavlinkCommander sends MISSION_CLEAR_ALL and waits for MISSION_ACK.
      - On success, the internal Mission model is cleared.
      - On failure, the error is emitted on TelemetryBus and the existing mission is preserved.
      - Requires command confirmation (safety-critical).
    implementation_rules:
      - Reuse MavlinkCommander and confirmation gate.
      - Clear operation is atomic from the user's perspective.
      - Add tests for success, NAK, timeout, and unconfirmed rejection.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P3-004
    phase: P3
    title: Mission ACK handling
    priority: medium
    area: mission
    risk: medium
    depends_on: [P2-001]
    acceptance:
      - The parser and command service correctly handle MAV_MISSION_RESULT codes.
      - Each result code maps to a typed enum (Accepted, Error, UnsupportedFrame, etc.).
      - Result codes are propagated to the UI through TelemetryBus.
      - Unknown/future result codes are handled gracefully (logged as unknown, not crashed).
    implementation_rules:
      - Extend MavlinkParser with mission result decoding.
      - Extend MavlinkCommander with mission-specific result handling.
      - Add tests for each known result code and for unknown codes.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P3-005
    phase: P3
    title: Parameter protocol download
    priority: high
    area: parameter
    risk: high
    depends_on: [P2-001, P2-002]
    acceptance:
      - MavlinkCommander can initiate PARAM_REQUEST_LIST.
      - The system receives PARAM_VALUE messages and builds an internal ParameterStore.
      - Progress is emitted on TelemetryBus.
      - Timeouts and retries are handled per the command ACK framework.
      - Parameters are stored with ID, value, type, and MAV_PARAM_TYPE.
      - Can be tested with a mock MAVLink responder.
    implementation_rules:
      - Keep ParameterStore separate from UI; UI observes ParameterState.
      - Reuse MavlinkCommander for sequencing and retry.
      - Do not block the main thread during download.
      - Add tests for full download, partial download, timeout, retry, and type handling.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned

  - id: P3-006
    phase: P3
    title: Parameter edit, search, and diff
    priority: medium
    area: parameter
    risk: medium
    depends_on: [P3-005]
    acceptance:
      - ParameterStore supports search by ID substring and filter by type.
      - Edited parameters are staged before commit; commit sends PARAM_SET and waits for PARAM_VALUE ACK.
      - A diff view shows current vs. default vs. onboard values.
      - Import/export to/from JSON/CSV is supported.
      - Changes are validated (range checks, type checks) before sending.
      - Can be tested without a real vehicle.
    implementation_rules:
      - Search/filter logic is in ParameterStore, not UI.
      - Commit uses MavlinkCommander with confirmation gate for safety-critical params.
      - Import/export is file I/O only; no network.
      - Add tests for search, filter, diff, edit staging, commit success, commit NAK, import, and export.
    test_commands:
      - cmake --build build --config Release
      - ctest --test-dir build --output-on-failure
    status: planned


